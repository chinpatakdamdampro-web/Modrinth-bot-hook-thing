name: Modrinth Update Notifier

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch: # Allows you to run the action manually from the Actions tab

permissions:
  contents: write # Required to push state.json back to the repository

jobs:
  check-modrinth:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      - name: Make Gradle Wrapper Executable
        run: chmod +x gradlew

      - name: Run Notifier Application
        env:
          WEBHOOK_URL: ${{ secrets.WEBHOOK_URL }}
        run: ./gradlew run

      - name: Commit and Push state.json
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add state.json
          
          # Only commit and push if the state.json was actually modified
          if ! git diff-index --quiet HEAD; then
            git commit -m "chore: update modrinth state.json"
            git push
          else
            echo "No new updates found. state.json remains unchanged."
          fi
